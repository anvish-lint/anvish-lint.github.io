name: Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out website repo
        uses: actions/checkout@v4

      - name: Check out anvish core
        uses: actions/checkout@v4
        with:
          repository: nE0sIghT/anvish
          path: anvish-core

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: Install toolchain packages
        run: |
          sudo apt-get update
          sudo apt-get install -y clang wasi-libc

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build site
        run: ./scripts/build-site.sh

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
